version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: edtech_postgres
    environment:
      POSTGRES_USER: edtech_user
      POSTGRES_PASSWORD: edtech_password_123
      POSTGRES_DB: edtech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edtech_user -d edtech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edtech_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: edtech_redis
    command: redis-server --appendonly yes --requirepass edtech_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edtech_network

  # Elasticsearch for full-text search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: edtech_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=elastic_password
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - edtech_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
    container_name: edtech_backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: edtech_user
      DB_PASSWORD: edtech_password_123
      DB_NAME: edtech_db
      REDIS_URL: redis://:edtech_redis_password@redis:6379
      JWT_SECRET: your-secret-key-change-in-production
      CORS_ORIGIN: "http://localhost:8080,http://localhost:3000"
      ELASTICSEARCH_HOST: elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: elastic_password
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend-api:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - edtech_network

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edtech_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@edtech.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - edtech_network

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: edtech_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - edtech_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  edtech_network:
    driver: bridge
