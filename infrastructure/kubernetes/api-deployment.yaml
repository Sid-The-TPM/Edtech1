apiVersion: apps/v1
kind: Deployment
metadata:
  name: edtech-api
  namespace: edtech
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edtech-api
  template:
    metadata:
      labels:
        app: edtech-api
    spec:
      containers:
      - name: edtech-api
        image: your-registry/edtech-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: edtech-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: edtech-secrets
              key: jwt-secret
        - name: REDIS_URL
          value: redis://redis-service:6379
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edtech-api-service
  namespace: edtech
spec:
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  selector:
    app: edtech-api
